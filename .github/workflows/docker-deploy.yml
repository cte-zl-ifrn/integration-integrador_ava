name: Build, push and deploy Docker service

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  quality:
    name: Quality gates (lint, sast, tests, coverage)
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: integrador
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d integrador"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install quality dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-dev.txt pre-commit

    - name: Run lint + SAST (pre-commit on diff)
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          pre-commit run --from-ref "${{ github.event.pull_request.base.sha }}" --to-ref "${{ github.sha }}" --show-diff-on-failure
        else
          pre-commit run --from-ref "${{ github.event.before }}" --to-ref "${{ github.sha }}" --show-diff-on-failure
        fi

    - name: Run unit tests with coverage
      env:
        POSTGRES_ENGINE: django.db.backends.postgresql
        POSTGRES_HOST: db
        POSTGRES_PORT: 5432
        POSTGRES_DATABASE: integrador
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      run: |
        COVERAGE_RCFILE=src/.coveragerc coverage run src/manage.py test --verbosity 1
        COVERAGE_RCFILE=src/.coveragerc coverage report --fail-under=91
        COVERAGE_RCFILE=src/.coveragerc coverage xml -o coverage.xml
        python src/check_coverage_gate.py --coverage-xml coverage.xml --baseline-file .coverage-baseline --min 91 --ideal 95

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        flags: unittests
        name: integrador-ava
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

  build-and-push:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: quality

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set version in project.py
      run: |
        sed -i 's/"PROJECT_VERSION", ".*"/"PROJECT_VERSION", "${{ github.ref_name }}"/' src/settings/project.py

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ctezlifrn/avaintegrador:${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
        target: production

  deploy:
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'test' }}
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ vars.RUNNER_LABEL || 'self-hosted' }}
    needs: build-and-push
    steps:
    - name: Pull and restart service
      run: |
        cd ${{ vars.DEPLOY_DOCKER_PATH }}
        sed -i 's|ctezlifrn/avaintegrador:.*|ctezlifrn/avaintegrador:${{ github.ref_name }}|g' docker-compose.yml && \
        docker compose pull ${{ vars.DOCKER_SERVICE_NAME }}
        docker compose down ${{ vars.DOCKER_SERVICE_NAME }}
        docker compose up -d ${{ vars.DOCKER_SERVICE_NAME }}
        timeout 60s docker compose logs -f ${{ vars.DOCKER_SERVICE_NAME }} || true
