site_name: Integrador AVA
site_description: Documentação técnica do projeto Integrador AVA
site_url: https://cte-zl-ifrn.github.io/integration-integrador_ava/
repo_url: https://github.com/cte-zl-ifrn/integration-integrador_ava
repo_name: cte-zl-ifrn/integration-integrador_ava

theme:
  name: shadcn
  language: pt-BR
  color_mode: light  

plugins:
  - search
  - mermaid2
  - slides:
      font_size: "28px"
#   - excalidraw

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

nav:
  - Início: index.md
  - Apresentações: apresentacoes.md
  - Administração:
      - Visão geral: admin/index.md
      - Dashboard Ativação: DASHBOARD_ATIVACAO.md
      - Dashboard Proposal: DASHBOARD_PROPOSAL.md
  - Desenvolvimento:
      - Modelo:
          - Visão geral: model/index.md
      - Integrações:
          - Suap para local_suap: suap2local_suap/index.md
          - Suap para tool_sga: suap2tool_sga/index.md
          - SGA para tool_sga: sga2tool_sga/index.md
          - Moodle HTTP Mock: tests/moodle_mock.md
          - CSRF Monitoring: CSRF_MONITORING.md
  - Testes:
      - Visão geral: tests/index.md
      - Base: tests/base.md
      - Coorte: tests/coorte.md
      - Edu: tests/edu.md
      - Hacks: tests/hacks.md
      - Health: tests/health.md
      - Integrador: tests/integrador.md
      - Security: tests/security.md
      - Settings: tests/settings.md
