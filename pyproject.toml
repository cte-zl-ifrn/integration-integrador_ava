# https://beta.ruff.rs/docs/settings/
# https://google.github.io/styleguide/pyguide.html

[tool.ruff]
line-length = 120
# select = [
#     "F401",
#     "F403",
# ]
target-version = "py312"

[tool.ruff.lint.flake8-annotations]
allow-star-arg-any = true

[tool.ruff.lint.mccabe]
max-complexity = 5

[tool.ruff.lint.pycodestyle]
max-doc-length = 120

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.black]
line-length = 120

# [tool.ruff.per-file-ignores]
# "path/to/file.py" = ["E402"]
# "path/to/file.py" = ["E402"]

[tool.pytest.ini_options]
minversion = "6.0"
# addopts="-ra --cov-report term --cov-report html:coverage --cov-report xml:coverage/cobertura-coverage.xml --cov=."
addopts="-p no:warnings -ra  ."
filterwarnings="ignore::urllib3.exceptions.InsecureRequestWarning"

[tool.djlint]
profile = "django"
extension = "html"
# H016/H030/H031 geram falso positivo frequente em templates herdados com {% extends %}.
ignore = "H016,H030,H031"
